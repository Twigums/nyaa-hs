name: Update README commit hash

on:
  push:
    branches: [main]

jobs:
  update-hash:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Replace {hash} with current SHA
        run: sed -i "s/{hash}/${{ github.sha }}/g" README.md

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || git commit -m "chore: update README commit hash [skip ci]" README.md

      - name: Push
        run: git push
